name: Translate RSS

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: translate
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
      id-token: write

    services:
      rsshub:
        image: diygod/rsshub
        ports:
          - 1200:1200

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Wait for RSSHub ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1200/ > /dev/null 2>&1; then
              echo "RSSHub is ready"
              break
            fi
            echo "Waiting for RSSHub... ($i)"
            sleep 2
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run translation
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python translate_rss.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update translated feeds"
          git push
