name: Translate RSS

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: translate
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pages: write
      id-token: write

    services:
      rsshub:
        image: diygod/rsshub
        ports:
          - 1200:1200

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Wait for RSSHub ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1200/ > /dev/null 2>&1; then
              echo "RSSHub is ready"
              break
            fi
            echo "Waiting for RSSHub... ($i)"
            sleep 2
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run translation
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python translate_rss.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update translated feeds"

          # 另一个 workflow / PR merge 可能在此期间推到 main，重试 + rebase 兜住
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i rejected, rebasing on origin/main..."
            git pull --rebase origin main || git rebase --abort 2>/dev/null
            sleep $((i * 3))
          done
          echo "Push failed after 3 attempts" >&2
          exit 1
