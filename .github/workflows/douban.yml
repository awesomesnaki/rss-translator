name: Douban Scraper

on:
  schedule:
    - cron: "0 0 * * 1"  # 每周一 00:00 UTC（北京时间周一 08:00）
  workflow_dispatch:

concurrency:
  group: douban
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedgenerator

      - name: Run scraper
        env:
          DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
        run: python douban_scraper.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add feeds/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Douban feeds"
          git push
