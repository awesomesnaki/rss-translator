name: Douban Scraper

on:
  schedule:
    - cron: "0 0 * * 1"  # 每周一 00:00 UTC（北京时间周一 08:00）
  workflow_dispatch:

concurrency:
  group: douban
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
        run: python douban_scraper.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add feeds/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update Douban feeds"

          # 另一个 workflow / PR merge 可能在此期间推到 main，重试 + rebase 兜住
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i rejected, rebasing on origin/main..."
            git pull --rebase origin main || git rebase --abort 2>/dev/null
            sleep $((i * 3))
          done
          echo "Push failed after 3 attempts" >&2
          exit 1
